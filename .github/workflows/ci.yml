name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  validate:
    name: Validate and Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync

      - name: Run validation
        run: make validate

      - name: Run tests
        run: make test

      - name: Verify package build
        run: make build

  test-py37:
    name: Install + Smoke + Tests (Python 3.7)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.7"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install "pytest>=7.4,<8" "pytest-cov>=4.1,<5"

      - name: CLI smoke test
        run: llro --help

      - name: Run tests
        run: pytest

  docker-integration:
    name: Docker Integration (Route Switchover)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync

      - name: Run Docker integration tests
        run: make integration-test
